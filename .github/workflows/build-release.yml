name: Build & Release

on:
  push:
    branches: [main]

concurrency:
  group: build-release
  cancel-in-progress: true

jobs:
  build-release:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Generate schema SQL
        run: node scripts/generate-schema-sql.mjs

      - name: Generate version contract
        run: node scripts/generate-version-contract.mjs

      - name: Copy public assets
        run: |
          cp src/generated/version-contract.json public/version-contract.json
          cp prisma/schema.sql public/schema.sql

      - name: Build deploy-tools
        run: bash deploy-tools/build.sh

      - name: Build installer bundle
        run: bash scripts/build-installer-bundle.sh

      - name: Build Next.js
        run: NODE_OPTIONS='--max-old-space-size=8192' npx next build
        env:
          CI: 'true'
          SKIP_TYPECHECK: '1'

      - name: Build custom server
        run: node scripts/build-server.mjs

      - name: Build NUC artifact
        run: bash scripts/build-nuc-artifact.sh
        env:
          CI: 'true'
          MINISIGN_SECRET_KEY: ${{ secrets.MINISIGN_SECRET_KEY }}

      - name: Read release metadata
        id: meta
        run: |
          MANIFEST="public/artifacts/manifest.json"
          echo "release_id=$(jq -r '.releaseId' $MANIFEST)" >> $GITHUB_OUTPUT
          echo "version=$(jq -r '.version' $MANIFEST)" >> $GITHUB_OUTPUT

      - name: Verify AWS CLI
        run: aws --version

      - name: Upload artifacts to R2
        env:
          AWS_ACCESS_KEY_ID: 7f88becb19c3aa8403581fa2aa3cda66
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          ENDPOINT: https://45325ffd511728b7bbb7089379193b96.r2.cloudflarestorage.com
          BUCKET: gwi-pos-artifacts
        run: |
          RELEASE_ID="${{ steps.meta.outputs.release_id }}"

          upload_file() {
            local src="$1" dest="$2" content_type="$3" cache_control="$4"
            [ -f "$src" ] || return 0
            aws s3 cp "$src" "s3://${BUCKET}/${dest}" \
              --endpoint-url "$ENDPOINT" \
              --content-type "$content_type" \
              --cache-control "$cache_control" \
              --no-progress
          }

          # ── Immutable release artifacts (1yr cache) ──
          echo "Uploading release artifacts to releases/${RELEASE_ID}/..."
          for f in public/artifacts/*; do
            [ -f "$f" ] || continue
            BASENAME="$(basename "$f")"
            case "$BASENAME" in
              *.json)      CT="application/json" ;;
              *.sql)       CT="application/sql" ;;
              *.minisig)   CT="text/plain" ;;
              *.tar.zst)   CT="application/zstd" ;;
              *.run)       CT="application/octet-stream" ;;
              *)           CT="application/octet-stream" ;;
            esac
            upload_file "$f" "releases/${RELEASE_ID}/${BASENAME}" "$CT" "public, max-age=31536000, immutable"
          done

          # ── Latest pointers (no-cache, always fresh) ──
          echo "Uploading latest/ pointers..."
          upload_file "public/artifacts/manifest.json" "latest/manifest.json" "application/json" "no-cache, no-store, must-revalidate"
          upload_file "public/version-contract.json" "latest/version-contract.json" "application/json" "no-cache, no-store, must-revalidate"
          upload_file "public/schema.sql" "latest/schema.sql" "application/sql" "no-cache, no-store, must-revalidate"

          # Also upload release-descriptor if it exists (alias for manifest at latest/)
          upload_file "public/artifacts/manifest.json" "latest/release-descriptor.json" "application/json" "no-cache, no-store, must-revalidate"

          # ── Root-level files (no-cache) ──
          echo "Uploading root-level files..."
          upload_file "public/installer.run" "installer.run" "application/octet-stream" "no-cache, no-store, must-revalidate"
          upload_file "public/version-contract.json" "version-contract.json" "application/json" "no-cache, no-store, must-revalidate"
          upload_file "public/schema.sql" "schema.sql" "application/sql" "no-cache, no-store, must-revalidate"

          echo "Upload complete: ${RELEASE_ID}"

      - name: Verify upload
        run: |
          HTTP_CODE=$(curl -sI "https://pub-15bf4245be0e4c05b570d31988004d09.r2.dev/latest/release-descriptor.json" -o /dev/null -w "%{http_code}")
          if [ "$HTTP_CODE" != "200" ]; then
            echo "Verification failed: HTTP ${HTTP_CODE} for latest/release-descriptor.json"
            exit 1
          fi
          echo "Verified: latest/release-descriptor.json accessible at R2"

      # ── Docker image build & push (additive — tarball artifacts preserved above) ──

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: |
            ghcr.io/getwithitman/gwi-pos:${{ steps.meta.outputs.version }}
            ghcr.io/getwithitman/gwi-pos:latest
          labels: |
            org.opencontainers.image.version=${{ steps.meta.outputs.version }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Get image digest
        id: digest
        run: |
          DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' ghcr.io/getwithitman/gwi-pos:${{ steps.meta.outputs.version }} | cut -d@ -f2)
          echo "digest=$DIGEST" >> $GITHUB_OUTPUT
          echo "Image digest: $DIGEST"

      - name: Update release descriptor with image fields
        env:
          AWS_ACCESS_KEY_ID: 7f88becb19c3aa8403581fa2aa3cda66
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          ENDPOINT: https://45325ffd511728b7bbb7089379193b96.r2.cloudflarestorage.com
          BUCKET: gwi-pos-artifacts
        run: |
          RELEASE_ID="${{ steps.meta.outputs.release_id }}"
          VERSION="${{ steps.meta.outputs.version }}"
          DIGEST="${{ steps.digest.outputs.digest }}"

          # Read existing manifest and add image fields
          MANIFEST="public/artifacts/manifest.json"
          python3 -c "
          import json
          m = json.load(open('$MANIFEST'))
          m['descriptorVersion'] = 3
          m['imageRef'] = 'ghcr.io/getwithitman/gwi-pos:$VERSION'
          m['imageDigest'] = '$DIGEST'
          m['imagePlatform'] = 'linux/amd64'
          json.dump(m, open('$MANIFEST', 'w'), indent=2)
          "

          # Re-upload updated manifest to R2
          aws s3 cp "$MANIFEST" "s3://${BUCKET}/releases/${RELEASE_ID}/manifest.json" \
            --endpoint-url "$ENDPOINT" --content-type "application/json" \
            --cache-control "public, max-age=31536000, immutable" --no-progress
          aws s3 cp "$MANIFEST" "s3://${BUCKET}/latest/manifest.json" \
            --endpoint-url "$ENDPOINT" --content-type "application/json" \
            --cache-control "no-cache, no-store, must-revalidate" --no-progress

          echo "Release descriptor updated with imageRef and imageDigest"
