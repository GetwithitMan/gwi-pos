name: Build & Release

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: build-release
  cancel-in-progress: true

jobs:
  build-release:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Generate schema SQL
        run: node scripts/generate-schema-sql.mjs

      - name: Generate version contract
        run: node scripts/generate-version-contract.mjs

      - name: Copy public assets
        run: |
          cp src/generated/version-contract.json public/version-contract.json
          cp prisma/schema.sql public/schema.sql

      - name: Build deploy-tools
        run: bash deploy-tools/build.sh

      - name: Build installer bundle
        run: bash scripts/build-installer-bundle.sh

      - name: Build Next.js
        run: NODE_OPTIONS='--max-old-space-size=8192' npx next build
        env:
          CI: 'true'
          SKIP_TYPECHECK: '1'

      - name: Build custom server
        run: node scripts/build-server.mjs

      - name: Build NUC artifact
        run: bash scripts/build-nuc-artifact.sh
        env:
          CI: 'true'
          MINISIGN_SECRET_KEY: ${{ secrets.MINISIGN_SECRET_KEY }}

      - name: Read release metadata
        id: meta
        run: |
          MANIFEST="public/artifacts/manifest.json"
          echo "release_id=$(jq -r '.releaseId' $MANIFEST)" >> $GITHUB_OUTPUT
          echo "version=$(jq -r '.version' $MANIFEST)" >> $GITHUB_OUTPUT

      - name: Verify AWS CLI
        run: aws --version

      - name: Upload artifacts to R2
        env:
          AWS_ACCESS_KEY_ID: 7f88becb19c3aa8403581fa2aa3cda66
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          ENDPOINT: https://45325ffd511728b7bbb7089379193b96.r2.cloudflarestorage.com
          BUCKET: gwi-pos-artifacts
        run: |
          RELEASE_ID="${{ steps.meta.outputs.release_id }}"

          upload_file() {
            local src="$1" dest="$2" content_type="$3" cache_control="$4"
            [ -f "$src" ] || return 0
            aws s3 cp "$src" "s3://${BUCKET}/${dest}" \
              --endpoint-url "$ENDPOINT" \
              --content-type "$content_type" \
              --cache-control "$cache_control" \
              --no-progress
          }

          # ── Immutable release artifacts (1yr cache) ──
          echo "Uploading release artifacts to releases/${RELEASE_ID}/..."
          for f in public/artifacts/*; do
            [ -f "$f" ] || continue
            BASENAME="$(basename "$f")"
            case "$BASENAME" in
              *.json)      CT="application/json" ;;
              *.sql)       CT="application/sql" ;;
              *.minisig)   CT="text/plain" ;;
              *.tar.zst)   CT="application/zstd" ;;
              *.run)       CT="application/octet-stream" ;;
              *)           CT="application/octet-stream" ;;
            esac
            upload_file "$f" "releases/${RELEASE_ID}/${BASENAME}" "$CT" "public, max-age=31536000, immutable"
          done

          # ── Latest pointers (no-cache, always fresh) ──
          # NOTE: manifest.json is NOT uploaded here. It is uploaded AFTER the Docker
          # build step enriches it with imageRef/imageDigest. Uploading it here without
          # those fields causes "Manifest missing imageRef" failures during the 10-15 min
          # Docker build window. See "Update release descriptor with image fields" step.
          echo "Uploading latest/ pointers (manifest deferred until Docker build completes)..."
          upload_file "public/artifacts/manifest.json.minisig" "latest/manifest.json.minisig" "application/octet-stream" "no-cache, no-store, must-revalidate"
          upload_file "public/version-contract.json" "latest/version-contract.json" "application/json" "no-cache, no-store, must-revalidate"
          upload_file "public/schema.sql" "latest/schema.sql" "application/sql" "no-cache, no-store, must-revalidate"

          # ── Root-level files (no-cache) ──
          echo "Uploading root-level files..."
          upload_file "public/installer.run" "installer.run" "application/octet-stream" "no-cache, no-store, must-revalidate"
          upload_file "public/version-contract.json" "version-contract.json" "application/json" "no-cache, no-store, must-revalidate"
          upload_file "public/schema.sql" "schema.sql" "application/sql" "no-cache, no-store, must-revalidate"

          echo "Upload complete: ${RELEASE_ID}"

      # ── Docker image build & push ──
      # Manifest verification happens AFTER Docker fields are injected (end of workflow)

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        id: docker
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: |
            ghcr.io/getwithitman/gwi-pos:${{ steps.meta.outputs.version }}
            ghcr.io/getwithitman/gwi-pos:latest
          labels: |
            org.opencontainers.image.version=${{ steps.meta.outputs.version }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=https://github.com/GetwithitMan/gwi-pos
          build-args: |
            CACHE_BUST=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          sbom: true
          provenance: mode=max

      - name: Validate Docker image contract
        run: |
          IMAGE="ghcr.io/getwithitman/gwi-pos:${{ steps.meta.outputs.version }}"
          echo "Validating Docker image contract for $IMAGE..."
          docker run --rm "$IMAGE" sh -c '
            set -e
            test -f deploy-tools/src/migrate.js || { echo "FAIL: deploy-tools/src/migrate.js missing"; exit 1; }
            test -f deploy-tools/src/apply-schema.js || { echo "FAIL: deploy-tools/src/apply-schema.js missing"; exit 1; }
            test -f scripts/migration-helpers.js || { echo "FAIL: scripts/migration-helpers.js missing"; exit 1; }
            test -f public/version-contract.json || { echo "FAIL: public/version-contract.json missing"; exit 1; }
            node -e "const v = require(\"./public/version-contract.json\"); if (!v.version || !v.schemaVersion) { console.error(\"FAIL: version-contract.json missing version or schemaVersion\"); process.exit(1); }"
            echo "Docker image contract validated: all required files present, version-contract.json well-formed"
          '

      - name: Validate dashboard .deb
        run: |
          IMAGE="ghcr.io/getwithitman/gwi-pos:${{ steps.meta.outputs.version }}"
          docker run --rm "$IMAGE" sh -c '
            if [ -f public/gwi-nuc-dashboard.deb ]; then
              dpkg --info public/gwi-nuc-dashboard.deb > /dev/null || exit 1
              PKG=$(dpkg-deb -f public/gwi-nuc-dashboard.deb Package)
              test "$PKG" = "gwi-nuc-dashboard" || exit 1
              echo "Dashboard .deb validated: $(dpkg-deb -f public/gwi-nuc-dashboard.deb Version)"
            else
              echo "No dashboard .deb bundled (optional)"
            fi
          '

      - name: Appliance validation matrix
        run: |
          IMAGE="ghcr.io/getwithitman/gwi-pos:${{ steps.meta.outputs.version }}"
          PASS=0; FAIL=0

          check() {
            local name="$1"; shift
            if eval "$@" >/dev/null 2>&1; then
              echo "✓ $name"
              PASS=$((PASS+1))
            else
              echo "✗ $name"
              FAIL=$((FAIL+1))
            fi
          }

          echo "=== Appliance Validation Matrix ==="

          # ── Runtime contract ──
          check "migrate.js exists" docker run --rm $IMAGE test -f /app/deploy-tools/src/migrate.js
          check "apply-schema.js exists" docker run --rm $IMAGE test -f /app/deploy-tools/src/apply-schema.js
          check "migration-helpers.js exists" docker run --rm $IMAGE test -f /app/scripts/migration-helpers.js
          check "version-contract.json exists" docker run --rm $IMAGE test -f /app/public/version-contract.json
          check "version-contract has version" docker run --rm $IMAGE node -e "const v=require('/app/public/version-contract.json'); if(!v.version)process.exit(1)"
          check "version-contract has schemaVersion" docker run --rm $IMAGE node -e "const v=require('/app/public/version-contract.json'); if(!v.schemaVersion)process.exit(1)"
          check "version-contract has migrationCount" docker run --rm $IMAGE node -e "const v=require('/app/public/version-contract.json'); if(!v.migrationCount)process.exit(1)"

          # ── Server runtime ──
          check "server.js exists" docker run --rm $IMAGE test -f /app/server.js
          check "preload.js exists" docker run --rm $IMAGE test -f /app/preload.js
          check "prisma client generated" docker run --rm $IMAGE test -d /app/src/generated/prisma
          check ".next build exists" docker run --rm $IMAGE test -d /app/.next

          # ── Venue state support ──
          check "venue-state module loadable" docker run --rm $IMAGE node -e "require('/app/src/lib/venue-state')"

          # ── gwi-node scripts ──
          check "gwi-node.sh exists" docker run --rm $IMAGE test -f /app/public/scripts/gwi-node.sh
          check "installer.run exists" docker run --rm $IMAGE test -f /app/public/installer.run
          check "validate-sudo-paths.sh exists" docker run --rm $IMAGE test -f /app/scripts/validate-sudo-paths.sh

          # ── Dashboard .deb (optional) ──
          if docker run --rm $IMAGE test -f /app/public/gwi-nuc-dashboard.deb 2>/dev/null; then
            check "dashboard .deb valid" docker run --rm $IMAGE dpkg --info /app/public/gwi-nuc-dashboard.deb
            check "dashboard .deb package name" "docker run --rm $IMAGE dpkg-deb -f /app/public/gwi-nuc-dashboard.deb Package | grep -q gwi-nuc-dashboard"
          else
            echo "○ dashboard .deb not bundled (optional)"
          fi

          # ── Installer modules ──
          check "05-deploy-app.sh exists" docker run --rm $IMAGE test -f /app/public/installer-modules/05-deploy-app.sh
          check "06-schema.sh exists" docker run --rm $IMAGE test -f /app/public/installer-modules/06-schema.sh
          check "07-services.sh exists" docker run --rm $IMAGE test -f /app/public/installer-modules/07-services.sh
          check "12-dashboard.sh exists" docker run --rm $IMAGE test -f /app/public/installer-modules/12-dashboard.sh

          # ── Canonical docs ──
          check "CANONICAL-MONEY-SPEC.md exists" docker run --rm $IMAGE test -f /app/docs/guides/CANONICAL-MONEY-SPEC.md
          check "VERSION-TRUTH.md exists" docker run --rm $IMAGE test -f /app/docs/guides/VERSION-TRUTH.md

          echo ""
          echo "=== Results: $PASS passed, $FAIL failed ==="
          test $FAIL -eq 0

      # ── Phase C: Cosign signing + SBOM ──

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign image with Cosign (keyless, OIDC)
        continue-on-error: true
        run: |
          IMAGE="ghcr.io/getwithitman/gwi-pos@${{ steps.docker.outputs.digest }}"
          echo "Signing: $IMAGE"
          cosign sign --yes "$IMAGE"
          echo "Image signed with Cosign (keyless OIDC)"

      - name: Generate and attach SBOM
        continue-on-error: true
        run: |
          IMAGE="ghcr.io/getwithitman/gwi-pos@${{ steps.docker.outputs.digest }}"
          cosign attach sbom --type spdx "$IMAGE" 2>/dev/null || echo "SBOM attachment skipped (already inline from buildx)"
          echo "SBOM attached to image"

      - name: Update release descriptor with image fields
        env:
          AWS_ACCESS_KEY_ID: 7f88becb19c3aa8403581fa2aa3cda66
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          ENDPOINT: https://45325ffd511728b7bbb7089379193b96.r2.cloudflarestorage.com
          BUCKET: gwi-pos-artifacts
        run: |
          RELEASE_ID="${{ steps.meta.outputs.release_id }}"
          VERSION="${{ steps.meta.outputs.version }}"
          DIGEST="${{ steps.docker.outputs.digest }}"

          MANIFEST="public/artifacts/manifest.json"
          python3 -c "
          import json
          m = json.load(open('$MANIFEST'))
          m['descriptorVersion'] = 3
          m['imageRef'] = 'ghcr.io/getwithitman/gwi-pos:$VERSION'
          m['imageDigest'] = '$DIGEST'
          m['imagePlatform'] = 'linux/amd64'
          m['signatureMethod'] = 'cosign-keyless-oidc'
          m['sbom'] = True
          m['provenance'] = True
          json.dump(m, open('$MANIFEST', 'w'), indent=2)
          "

          aws s3 cp "$MANIFEST" "s3://${BUCKET}/releases/${RELEASE_ID}/manifest.json" \
            --endpoint-url "$ENDPOINT" --content-type "application/json" \
            --cache-control "public, max-age=31536000, immutable" --no-progress
          aws s3 cp "$MANIFEST" "s3://${BUCKET}/latest/manifest.json" \
            --endpoint-url "$ENDPOINT" --content-type "application/json" \
            --cache-control "no-cache, no-store, must-revalidate" --no-progress
          aws s3 cp "$MANIFEST" "s3://${BUCKET}/latest/release-descriptor.json" \
            --endpoint-url "$ENDPOINT" --content-type "application/json" \
            --cache-control "no-cache, no-store, must-revalidate" --no-progress

          echo "Release descriptor v3 uploaded: imageRef=$VERSION, imageDigest=$DIGEST"

      # ── Final manifest verification (AFTER Docker fields injected + uploaded) ──
      - name: Verify release manifest
        env:
          R2_PUBLIC_URL: https://pub-15bf4245be0e4c05b570d31988004d09.r2.dev
        run: |
          set -euo pipefail
          echo "==> Verifying uploaded R2 manifest (post-Docker)..."
          MANIFEST=$(curl -sf --max-time 15 "${R2_PUBLIC_URL}/latest/manifest.json") || {
            echo "::error::Failed to fetch latest/manifest.json from R2"
            exit 1
          }
          REQUIRED_FIELDS="version releaseId artifactUrl artifactSha256 imageRef imageDigest"
          MISSING=""
          for field in $REQUIRED_FIELDS; do
            VALUE=$(echo "$MANIFEST" | python3 -c "import json,sys; m=json.load(sys.stdin); v=m.get('$field',''); print(v if v else '')")
            if [ -z "$VALUE" ]; then
              MISSING="$MISSING $field"
            fi
          done
          if [ -n "$MISSING" ]; then
            echo "::error::Release manifest missing required fields:$MISSING"
            echo "$MANIFEST" | python3 -m json.tool
            exit 1
          fi
          echo "$MANIFEST" | python3 -c "
          import json,sys
          m = json.load(sys.stdin)
          print('Version:', m['version'])
          print('Release:', m['releaseId'])
          print('Image:', m['imageRef'])
          print('Digest:', m['imageDigest'][:30] + '...')
          print('Tarball:', m['artifactSha256'][:20] + '...')
          print('Signed:', m.get('signatureMethod', 'none'))
          "
          echo "==> Manifest verified: all fields present"
