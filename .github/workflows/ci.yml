name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  typecheck-and-lint:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Schema drift check
        run: |
          # Only check the committed generated-client directory.
          # Avoid node_modules/.prisma/ which is layout-sensitive across Prisma versions.
          GENERATED_DIR="src/generated"
          if [ -d "$GENERATED_DIR" ]; then
            if git diff --exit-code --quiet -- "$GENERATED_DIR"; then
              echo "✓ Generated client matches committed state"
            else
              echo "::error::Schema drift detected — generated Prisma client differs from committed state. Run 'npx prisma generate' and commit."
              git diff --name-only -- "$GENERATED_DIR"
              exit 1
            fi
          else
            echo "::warning::No committed generated client directory at $GENERATED_DIR — skipping drift check"
          fi

      - name: Type check
        run: NODE_OPTIONS='--max-old-space-size=8192' npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npx vitest run
        continue-on-error: true  # Pre-existing failures in socket-emission-invariants and pair-native tests

      - name: Check version stamps
        run: bash scripts/ci/check-version-stamps.sh

      - name: Check forbidden domains
        run: bash scripts/ci/check-forbidden-domains.sh

      - name: Deploy engine state machine tests
        run: bash scripts/tests/test-deploy-release.sh

      - name: Installer module validation
        run: bash scripts/tests/test-installer-modules.sh

      - name: Enforce version bump
        if: github.event_name == 'pull_request'
        run: |
          bash scripts/ci/enforce-version-bump.sh "${{ github.event.pull_request.base.sha }}" "${{ github.sha }}"
