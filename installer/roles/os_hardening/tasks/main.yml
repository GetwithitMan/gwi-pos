---
# =============================================================================
# GWI POS — os_hardening role
# =============================================================================
# Disables suspend/hibernate/sleep, screen lock, and desktop notifications.
# Handles both KDE Plasma and GNOME desktops. Fully idempotent.
# =============================================================================

# ── logind drop-in: disable all power management keys ────────────────────────

- name: Create logind drop-in directory
  ansible.builtin.file:
    path: /etc/systemd/logind.conf.d
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Deploy GWI POS logind power-management override
  ansible.builtin.copy:
    dest: /etc/systemd/logind.conf.d/gwi-pos.conf
    owner: root
    group: root
    mode: "0644"
    content: |
      # GWI POS — disable all suspend/hibernate/lid/idle actions
      # Managed by Ansible os_hardening role — do not edit manually
      [Login]
      HandleSuspendKey=ignore
      HandleHibernateKey=ignore
      HandleLidSwitch=ignore
      HandleLidSwitchExternalPower=ignore
      IdleAction=ignore
  notify: restart systemd-logind

# ── Mask systemd sleep/suspend/hibernate targets ────────────────────────────

- name: Mask sleep-related systemd targets
  ansible.builtin.systemd:
    name: "{{ item }}"
    masked: true
  loop:
    - sleep.target
    - suspend.target
    - hibernate.target
    - hybrid-sleep.target

# ── Disable X11 screen blanking and DPMS (all roles, all desktops) ───────────

- name: Ensure .xprofile exists for POS user
  ansible.builtin.file:
    path: "{{ gwi_posuser_home }}/.xprofile"
    state: touch
    owner: "{{ gwi_posuser }}"
    group: "{{ gwi_posuser }}"
    mode: "0644"
    modification_time: preserve
    access_time: preserve

- name: Disable X11 screen blanking and DPMS in .xprofile
  ansible.builtin.lineinfile:
    path: "{{ gwi_posuser_home }}/.xprofile"
    line: "xset s off && xset -dpms  # GWI POS — screen stays on (managed by Ansible)"
    state: present
    create: true
    owner: "{{ gwi_posuser }}"
    group: "{{ gwi_posuser }}"
    mode: "0644"

# ═══════════════════════════════════════════════════════════════════════════════
# KDE Plasma specific (when: gwi_desktop_env == 'kde')
# ═══════════════════════════════════════════════════════════════════════════════

- name: "KDE — Mask plasma-powerdevil.service (user scope)"
  ansible.builtin.command:
    cmd: systemctl --user --global mask plasma-powerdevil.service
  register: _kde_powerdevil_mask
  changed_when: "'Created symlink' in _kde_powerdevil_mask.stderr"
  failed_when: false
  when: gwi_desktop_env == 'kde'

- name: "KDE — Ensure ~/.config directory exists"
  ansible.builtin.file:
    path: "{{ gwi_posuser_home }}/.config"
    state: directory
    owner: "{{ gwi_posuser }}"
    group: "{{ gwi_posuser }}"
    mode: "0700"
  when: gwi_desktop_env == 'kde'

- name: "KDE — Disable screen locker (kscreenlockerrc)"
  ansible.builtin.copy:
    dest: "{{ gwi_posuser_home }}/.config/kscreenlockerrc"
    owner: "{{ gwi_posuser }}"
    group: "{{ gwi_posuser }}"
    mode: "0644"
    content: |
      # GWI POS — disable screen locking
      # Managed by Ansible os_hardening role — do not edit manually
      [Daemon]
      Autolock=false
      LockOnResume=false
      Timeout=0
  become_user: "{{ gwi_posuser }}"
  when: gwi_desktop_env == 'kde'

- name: "KDE — Disable all power management (powermanagementprofilesrc)"
  ansible.builtin.copy:
    dest: "{{ gwi_posuser_home }}/.config/powermanagementprofilesrc"
    owner: "{{ gwi_posuser }}"
    group: "{{ gwi_posuser }}"
    mode: "0644"
    content: |
      # GWI POS — disable all power management (screen stays on forever)
      # Managed by Ansible os_hardening role — do not edit manually
      [AC][DPMSControl]
      idleTime=0
      lockBeforeTurnOff=0

      [AC][DimDisplay]
      idleTime=0

      [AC][SuspendSession]
      idleTime=0
      suspendThenHibernate=false
      suspendType=0
  become_user: "{{ gwi_posuser }}"
  when: gwi_desktop_env == 'kde'

- name: "KDE — Set empty session on login (ksmserverrc)"
  ansible.builtin.copy:
    dest: "{{ gwi_posuser_home }}/.config/ksmserverrc"
    owner: "{{ gwi_posuser }}"
    group: "{{ gwi_posuser }}"
    mode: "0644"
    content: |
      # GWI POS — empty session on login (no restore)
      # Managed by Ansible os_hardening role — do not edit manually
      [General]
      loginMode=emptySession
  become_user: "{{ gwi_posuser }}"
  when: gwi_desktop_env == 'kde'

- name: "KDE — Mute notification sounds (plasmanotifyrc)"
  ansible.builtin.copy:
    dest: "{{ gwi_posuser_home }}/.config/plasmanotifyrc"
    owner: "{{ gwi_posuser }}"
    group: "{{ gwi_posuser }}"
    mode: "0644"
    content: |
      # GWI POS — mute notification sounds
      # Managed by Ansible os_hardening role — do not edit manually
      [DoNotDisturb]
      NotificationSoundsMuted=true
  become_user: "{{ gwi_posuser }}"
  when: gwi_desktop_env == 'kde'

# ═══════════════════════════════════════════════════════════════════════════════
# GNOME specific (when: gwi_desktop_env == 'gnome')
# ═══════════════════════════════════════════════════════════════════════════════

- name: "GNOME — Apply gsettings (idle-delay, screen lock, notifications)"
  ansible.builtin.shell: |
    export DISPLAY=:0
    POSUSER_UID=$(id -u "{{ gwi_posuser }}" 2>/dev/null || echo "")
    if [ -n "$POSUSER_UID" ]; then
      export DBUS_SESSION_BUS_ADDRESS="unix:path=/run/user/$POSUSER_UID/bus"
    fi
    gsettings set org.gnome.desktop.session idle-delay 0 2>/dev/null || true
    gsettings set org.gnome.desktop.screensaver lock-enabled false 2>/dev/null || true
    gsettings set org.gnome.desktop.notifications show-banners false 2>/dev/null || true
  args:
    executable: /bin/bash
  become_user: "{{ gwi_posuser }}"
  changed_when: false
  failed_when: false
  when: gwi_desktop_env == 'gnome'

# ── Persist GNOME settings via dconf database (offline fallback) ─────────────
# gsettings may fail if no session is active. Write dconf db as a safety net.

- name: "GNOME — Ensure dconf profile directory exists"
  ansible.builtin.file:
    path: /etc/dconf/profile
    state: directory
    owner: root
    group: root
    mode: "0755"
  when: gwi_desktop_env == 'gnome'

- name: "GNOME — Write dconf user profile"
  ansible.builtin.copy:
    dest: /etc/dconf/profile/user
    owner: root
    group: root
    mode: "0644"
    content: |
      user-db:user
      system-db:gwi-pos
  when: gwi_desktop_env == 'gnome'

- name: "GNOME — Ensure dconf db directory exists"
  ansible.builtin.file:
    path: /etc/dconf/db/gwi-pos.d
    state: directory
    owner: root
    group: root
    mode: "0755"
  when: gwi_desktop_env == 'gnome'

- name: "GNOME — Write dconf power/lock overrides"
  ansible.builtin.copy:
    dest: /etc/dconf/db/gwi-pos.d/00-gwi-pos-hardening
    owner: root
    group: root
    mode: "0644"
    content: |
      # GWI POS — GNOME hardening overrides
      # Managed by Ansible os_hardening role — do not edit manually
      [org/gnome/desktop/session]
      idle-delay=uint32 0

      [org/gnome/desktop/screensaver]
      lock-enabled=false

      [org/gnome/desktop/notifications]
      show-banners=false
  register: _gnome_dconf_override
  when: gwi_desktop_env == 'gnome'

- name: "GNOME — Ensure dconf locks directory exists"
  ansible.builtin.file:
    path: /etc/dconf/db/gwi-pos.d/locks
    state: directory
    owner: root
    group: root
    mode: "0755"
  when: gwi_desktop_env == 'gnome'

- name: "GNOME — Lock hardening settings (prevent user override)"
  ansible.builtin.copy:
    dest: /etc/dconf/db/gwi-pos.d/locks/00-gwi-pos-hardening
    owner: root
    group: root
    mode: "0644"
    content: |
      /org/gnome/desktop/session/idle-delay
      /org/gnome/desktop/screensaver/lock-enabled
      /org/gnome/desktop/notifications/show-banners
  register: _gnome_dconf_locks
  when: gwi_desktop_env == 'gnome'

- name: "GNOME — Update dconf database"
  ansible.builtin.command: dconf update
  changed_when: _gnome_dconf_override is changed or _gnome_dconf_locks is changed
  when:
    - gwi_desktop_env == 'gnome'
    - _gnome_dconf_override is changed or _gnome_dconf_locks is changed

# ═══════════════════════════════════════════════════════════════════════════════
# Display manager auto-login (POS NUCs should never show a login screen)
# ═══════════════════════════════════════════════════════════════════════════════

- name: "SDDM — Configure auto-login"
  ansible.builtin.copy:
    dest: /etc/sddm.conf.d/autologin.conf
    owner: root
    group: root
    mode: "0644"
    content: |
      [Autologin]
      User={{ gwi_posuser }}
      Session={{ gwi_sddm_session | default('plasma.desktop') }}
  when: gwi_desktop_env == 'kde'

- name: "GDM — Configure auto-login"
  ansible.builtin.lineinfile:
    path: /etc/gdm3/custom.conf
    regexp: "{{ item.regexp }}"
    line: "{{ item.line }}"
    insertafter: '^\[daemon\]'
    create: true
  loop:
    - { regexp: '^AutomaticLoginEnable=', line: 'AutomaticLoginEnable=true' }
    - { regexp: '^AutomaticLogin=', line: 'AutomaticLogin={{ gwi_posuser }}' }
  when: gwi_desktop_env == 'gnome'
