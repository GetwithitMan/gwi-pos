---
# ═══════════════════════════════════════════════════════════════════════════════
# app_deploy — Thin deploy orchestrator (gwi-node.sh is the canonical agent)
# ═══════════════════════════════════════════════════════════════════════════════
# Ensures the gwipos system user, directory skeleton, signing key, and
# gwi-node.sh are in place, then delegates the actual deploy to gwi-node.
# deploy-release.sh is kept as a legacy fallback but never executed.
# ═══════════════════════════════════════════════════════════════════════════════

# ── System user / group ──────────────────────────────────────────────────────
- name: Ensure gwipos system user exists
  ansible.builtin.user:
    name: gwipos
    system: true
    shell: /bin/false
    create_home: true
    home: /home/gwipos
    state: present

# ── Directory skeleton ───────────────────────────────────────────────────────
- name: Create GWI POS directory skeleton
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: gwipos
    group: gwipos
    mode: "0755"
  loop:
    - /opt/gwi-pos
    - /opt/gwi-pos/releases
    - /opt/gwi-pos/shared
    - /opt/gwi-pos/shared/logs
    - /opt/gwi-pos/shared/logs/deploys
    - /opt/gwi-pos/shared/data
    - /opt/gwi-pos/shared/state
    - /opt/gwi-pos/cache
    - /opt/gwi-pos/cache/artifacts

- name: Create keys directory (root-owned, gwipos group-traversable for pub key reads)
  ansible.builtin.file:
    path: /opt/gwi-pos/keys
    state: directory
    owner: root
    group: gwipos
    mode: "0750"

# ── Minisign public key ─────────────────────────────────────────────────────
- name: Install minisign public key for release verification
  ansible.builtin.copy:
    content: "{{ gwi_signing_public_key }}"
    dest: /opt/gwi-pos/keys/gwi-pos-release.pub
    owner: gwipos
    group: gwipos
    mode: "0644"

# ── Deploy agent (gwi-node.sh) ──────────────────────────────────────────────
- name: Check if /opt/gwi-pos/current exists
  ansible.builtin.stat:
    path: /opt/gwi-pos/current
  register: _current_link

- name: Check if gwi-node.sh already installed
  ansible.builtin.stat:
    path: /opt/gwi-pos/gwi-node.sh
  register: _gwi_node_installed

- name: Copy gwi-node.sh from current release (if not already installed)
  ansible.builtin.copy:
    src: /opt/gwi-pos/current/public/scripts/gwi-node.sh
    dest: /opt/gwi-pos/gwi-node.sh
    remote_src: true
    owner: root
    group: root
    mode: "0755"
  when:
    - not (_gwi_node_installed.stat.exists | default(false))
    - _current_link.stat.exists | default(false)

# ── Legacy: deploy-release.sh (kept for backward compat, never executed) ────
- name: Copy deploy-release.sh from current release (legacy fallback only)
  ansible.builtin.copy:
    src: /opt/gwi-pos/current/public/scripts/deploy-release.sh
    dest: /opt/gwi-pos/deploy-release.sh
    remote_src: true
    owner: gwipos
    group: gwipos
    mode: "0755"
  when: _current_link.stat.exists | default(false)
  ignore_errors: true

# ── Run artifact deploy via gwi-node ─────────────────────────────────────────
- name: Run artifact deploy via gwi-node
  command: /opt/gwi-pos/gwi-node.sh deploy {{ '--force' if gwi_force_deploy | default(false) else '' }}
  register: deploy_result
  changed_when: "'healthy' in deploy_result.stdout"
  failed_when: deploy_result.rc != 0
