---
# =============================================================================
# GWI POS — firewall role
# =============================================================================
# Configures ufw with deny-incoming/allow-outgoing defaults, then opens
# only the ports needed for the station role. HA-aware (VRRP + Postgres).
# Fully idempotent — ufw CLI commands are naturally idempotent.
#
# NOTE: Uses ansible.builtin.command with ufw CLI instead of
# community.general.ufw to avoid Galaxy dependency. ansible-core only.
# =============================================================================

# ── Install ufw ──────────────────────────────────────────────────────────────

- name: Install ufw
  ansible.builtin.apt:
    name: ufw
    state: present
    update_cache: true
    cache_valid_time: 3600

# ── Default policies ─────────────────────────────────────────────────────────

- name: Set ufw default deny incoming
  ansible.builtin.command: ufw default deny incoming
  register: _ufw_default_deny
  changed_when: "'Default incoming policy changed' in _ufw_default_deny.stdout"

- name: Set ufw default allow outgoing
  ansible.builtin.command: ufw default allow outgoing
  register: _ufw_default_allow
  changed_when: "'Default outgoing policy changed' in _ufw_default_allow.stdout"

# ── Core rules (all station roles) ──────────────────────────────────────────

- name: "Allow SSH ({{ gwi_ssh_port }}/tcp)"
  ansible.builtin.command: "ufw allow {{ gwi_ssh_port }}/tcp comment 'GWI POS — SSH'"
  register: _ufw_ssh
  changed_when: "'Rule added' in _ufw_ssh.stdout or 'Rules updated' in _ufw_ssh.stdout"
  failed_when: _ufw_ssh.rc != 0 and 'Skipping' not in _ufw_ssh.stdout

- name: "Allow VNC ({{ gwi_vnc_port }}/tcp)"
  ansible.builtin.command: "ufw allow {{ gwi_vnc_port }}/tcp comment 'GWI POS — VNC remote support'"
  register: _ufw_vnc
  changed_when: "'Rule added' in _ufw_vnc.stdout or 'Rules updated' in _ufw_vnc.stdout"
  failed_when: _ufw_vnc.rc != 0 and 'Skipping' not in _ufw_vnc.stdout

# ── POS port (servers and backups only, skip for terminals) ──────────────────

- name: "Allow POS application port ({{ gwi_pos_port }}/tcp)"
  ansible.builtin.command: "ufw allow {{ gwi_pos_port }}/tcp comment 'GWI POS — application'"
  register: _ufw_pos
  changed_when: "'Rule added' in _ufw_pos.stdout or 'Rules updated' in _ufw_pos.stdout"
  failed_when: _ufw_pos.rc != 0 and 'Skipping' not in _ufw_pos.stdout
  when: gwi_station_role != 'terminal'

# ── HA mode rules (only when VIRTUAL_IP is set) ─────────────────────────────

- name: Detect local subnet for HA rules
  ansible.builtin.shell: |
    set -o pipefail
    DEFAULT_IF=$(ip -4 route show default 2>/dev/null | awk '{print $5}' | head -1)
    if [ -n "$DEFAULT_IF" ]; then
      ip -4 addr show dev "$DEFAULT_IF" 2>/dev/null | grep -oP 'inet \K[\d.]+/\d+' | head -1 || echo ""
    else
      echo ""
    fi
  args:
    executable: /bin/bash
  register: _local_subnet
  changed_when: false
  failed_when: false
  when: gwi_virtual_ip | default('') | length > 0

- name: "Allow PostgreSQL ({{ gwi_pg_port }}/tcp) on local subnet (HA mode)"
  ansible.builtin.command: >-
    ufw allow from {{ _local_subnet.stdout | trim }}
    to any port {{ gwi_pg_port }} proto tcp
    comment 'GWI POS — PostgreSQL HA replication'
  register: _ufw_pg
  changed_when: "'Rule added' in _ufw_pg.stdout or 'Rules updated' in _ufw_pg.stdout"
  failed_when: _ufw_pg.rc != 0 and 'Skipping' not in _ufw_pg.stdout
  when:
    - gwi_virtual_ip | default('') | length > 0
    - _local_subnet.stdout | default('') | trim | length > 0

- name: Allow VRRP protocol 112 (HA mode)
  ansible.builtin.shell: |
    {% raw %}
    set -o pipefail
    # ufw does not support raw IP protocol 112 directly — use before.rules
    BEFORE_RULES="/etc/ufw/before.rules"
    VRRP_RULE="-A ufw-before-input -p 112 -j ACCEPT"
    if ! grep -qF -- "$VRRP_RULE" "$BEFORE_RULES" 2>/dev/null; then
      sed -i "/^COMMIT/i $VRRP_RULE" "$BEFORE_RULES"
      echo "changed"
    else
      echo "ok"
    fi
    {% endraw %}
  args:
    executable: /bin/bash
  register: _vrrp_result
  changed_when: "'changed' in _vrrp_result.stdout"
  when: gwi_virtual_ip | default('') | length > 0

# ── Enable ufw ───────────────────────────────────────────────────────────────

- name: Enable ufw
  ansible.builtin.command: ufw --force enable
  register: _ufw_enable
  changed_when: "'Firewall is active' in _ufw_enable.stdout"
