---
# =============================================================================
# GWI POS — display_manager role
# =============================================================================
# Configures auto-login for the POS user. KDE uses SDDM, GNOME uses GDM3.
# GNOME: forces X11 (disables Wayland) — sets gwi_reboot_needed if changed.
# Fully idempotent.
#
# NOTE: Uses ansible.builtin.lineinfile instead of community.general.ini_file
# to avoid Galaxy dependency. ansible-core only.
# =============================================================================

# ═══════════════════════════════════════════════════════════════════════════════
# SDDM / KDE Plasma
# ═══════════════════════════════════════════════════════════════════════════════

- name: "SDDM — Create drop-in directory"
  ansible.builtin.file:
    path: /etc/sddm.conf.d
    state: directory
    owner: root
    group: root
    mode: "0755"
  when: gwi_desktop_env == 'kde'

- name: "SDDM — Configure auto-login for POS user"
  ansible.builtin.copy:
    dest: /etc/sddm.conf.d/gwi-autologin.conf
    owner: root
    group: root
    mode: "0644"
    content: |
      # GWI POS — SDDM auto-login configuration
      # Managed by Ansible display_manager role — do not edit manually
      [Autologin]
      User={{ gwi_posuser }}
      Session=plasma.desktop
  notify: restart display-manager
  when: gwi_desktop_env == 'kde'

# ═══════════════════════════════════════════════════════════════════════════════
# GDM3 / GNOME
# ═══════════════════════════════════════════════════════════════════════════════

# ── Read current Wayland state before making changes ─────────────────────────

- name: "GDM3 — Check current WaylandEnable value"
  ansible.builtin.shell: |
    if [ -f /etc/gdm3/custom.conf ]; then
      grep -E '^\s*WaylandEnable\s*=' /etc/gdm3/custom.conf 2>/dev/null | tail -1 | \
        sed 's/.*=\s*//' | tr -d ' ' || echo "not_set"
    else
      echo "not_set"
    fi
  args:
    executable: /bin/bash
  register: _gdm3_wayland_before
  changed_when: false
  failed_when: false
  when: gwi_desktop_env == 'gnome'

# ── Configure GDM3 auto-login and X11 ───────────────────────────────────────
# Write the complete custom.conf to avoid dependency on community.general.ini_file

- name: "GDM3 — Write complete custom.conf with auto-login and X11"
  ansible.builtin.copy:
    dest: /etc/gdm3/custom.conf
    owner: root
    group: root
    mode: "0644"
    content: |
      # GWI POS — GDM3 configuration
      # Managed by Ansible display_manager role — do not edit manually
      [daemon]
      AutomaticLoginEnable=true
      AutomaticLogin={{ gwi_posuser }}
      WaylandEnable=false

      [security]

      [xdmcp]

      [chooser]

      [debug]
  register: _gdm3_config_change
  notify: restart display-manager
  when: gwi_desktop_env == 'gnome'

# ── Flag reboot needed if Wayland was previously active ──────────────────────

- name: "GDM3 — Set reboot flag if Wayland was enabled"
  ansible.builtin.set_fact:
    gwi_reboot_needed: true
  when:
    - gwi_desktop_env == 'gnome'
    - _gdm3_wayland_before.stdout | default('not_set') | trim not in ['false', 'False', 'FALSE']
    - _gdm3_config_change is changed
