---
# =============================================================================
# kiosk_hardening — Dashboard Service
# =============================================================================
# Deploys the GWI NUC Dashboard as a systemd user service with auto-restart.
# The keep-awake watchdog also ensures the dashboard stays running.
# Fully idempotent.
# =============================================================================

- name: "Dashboard — Ensure systemd user directory exists"
  ansible.builtin.file:
    path: "{{ gwi_posuser_home }}/.config/systemd/user"
    state: directory
    owner: "{{ gwi_posuser }}"
    group: "{{ gwi_posuser }}"
    mode: "0755"
  become_user: "{{ gwi_posuser }}"

- name: "Dashboard — Resolve binary path"
  ansible.builtin.shell: command -v gwi-dashboard 2>/dev/null || command -v gwi-nuc-dashboard 2>/dev/null || echo "/usr/bin/gwi-dashboard"
  args:
    executable: /bin/bash
  register: _dashboard_bin
  changed_when: false
  failed_when: false

- name: "Dashboard — Set binary fact"
  ansible.builtin.set_fact:
    gwi_dashboard_bin: "{{ _dashboard_bin.stdout | trim }}"
  when: _dashboard_bin.stdout | trim | length > 0

- name: "Dashboard — Deploy systemd user service"
  ansible.builtin.copy:
    dest: "{{ gwi_posuser_home }}/.config/systemd/user/gwi-dashboard.service"
    owner: "{{ gwi_posuser }}"
    group: "{{ gwi_posuser }}"
    mode: "0644"
    content: |
      [Unit]
      Description=GWI NUC Dashboard
      After=graphical-session.target
      StartLimitBurst=5
      StartLimitIntervalSec=120

      [Service]
      ExecStart={{ gwi_dashboard_bin | default('/usr/bin/gwi-dashboard') }}
      Restart=on-failure
      RestartSec=5
      Environment=DISPLAY=:0
      Environment=XAUTHORITY=/run/user/%U/.Xauthority
      Environment=XDG_RUNTIME_DIR=/run/user/%U
      Environment=GWI_POS_URL=http://localhost:3005

      [Install]
      WantedBy=default.target
  become_user: "{{ gwi_posuser }}"

- name: "Dashboard — Enable service"
  ansible.builtin.systemd:
    name: gwi-dashboard.service
    scope: user
    enabled: true
    daemon_reload: true
  become_user: "{{ gwi_posuser }}"
  failed_when: false
