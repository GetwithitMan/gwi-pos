# GWI POS AIDE configuration
database_in=file:/var/lib/aide/aide.db
database_out=file:/var/lib/aide/aide.db.new

# What to check
GWI_CRITICAL = p+i+n+u+g+s+b+m+c+sha256
GWI_BINARIES = p+i+n+u+g+s+b+sha256

# System binaries
/usr/bin GWI_BINARIES
/usr/sbin GWI_BINARIES
/bin GWI_BINARIES
/sbin GWI_BINARIES

# POS application integrity
/opt/gwi-pos/current/server.js GWI_CRITICAL
/opt/gwi-pos/current/package.json GWI_CRITICAL
/opt/gwi-pos/deploy-release.sh GWI_CRITICAL

# Configuration files
/etc/ssh/sshd_config.d/ GWI_CRITICAL
/etc/sudoers.d/ GWI_CRITICAL
/etc/ufw/ GWI_CRITICAL
/etc/sysctl.d/ GWI_CRITICAL

# Exclude volatile paths
!/var/log
!/var/cache
!/tmp
!/opt/gwi-pos/shared/logs
!/opt/gwi-pos/shared/state
!/opt/gwi-pos/releases
