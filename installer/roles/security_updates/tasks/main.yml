---
# =============================================================================
# security_updates — Optional
# =============================================================================
# Configures unattended-upgrades for automatic security patching.
# Only security updates are enabled. Automatic reboot is DISABLED —
# reboots are managed by the reboot_manager role under controlled policy.
# =============================================================================

# ── Install unattended-upgrades ───────────────────────────────────────────

- name: Install unattended-upgrades
  ansible.builtin.package:
    name: unattended-upgrades
    state: present

# ── Configure allowed origins (security only) ─────────────────────────────

- name: Write unattended-upgrades config
  ansible.builtin.copy:
    content: |
      // GWI POS — Unattended security upgrades
      // Managed by Ansible — do not edit manually
      //
      // Only security updates are auto-applied. Feature/version upgrades
      // are managed via the baseline enforcement pipeline.
      Unattended-Upgrade::Allowed-Origins {
          "${distro_id}:${distro_codename}-security";
      };

      // NEVER auto-reboot — reboot_manager role handles reboots
      // under controlled policy (maintenance window, no active orders)
      Unattended-Upgrade::Automatic-Reboot "false";

      // Remove unused kernel packages after upgrade
      Unattended-Upgrade::Remove-Unused-Kernel-Packages "true";

      // Remove unused auto-installed dependencies
      Unattended-Upgrade::Remove-Unused-Dependencies "true";

      // Do not auto-fix interrupted dpkg
      Unattended-Upgrade::AutoFixInterruptedDpkg "true";

      // Minimal install step (no restart of services during business hours)
      Unattended-Upgrade::MinimalSteps "true";
    dest: /etc/apt/apt.conf.d/50unattended-upgrades
    owner: root
    group: root
    mode: "0644"

# ── Enable automatic update checking ──────────────────────────────────────

- name: Write auto-upgrades periodic config
  ansible.builtin.copy:
    content: |
      // GWI POS — Automatic package list updates + security upgrades
      // Managed by Ansible — do not edit manually
      APT::Periodic::Update-Package-Lists "1";
      APT::Periodic::Unattended-Upgrade "1";
    dest: /etc/apt/apt.conf.d/20auto-upgrades
    owner: root
    group: root
    mode: "0644"
