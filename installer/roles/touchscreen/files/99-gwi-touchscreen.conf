Section "InputClass"
    Identifier "GWI POS Touchscreen"
    MatchIsTouchscreen "on"
    Driver "libinput"
    Option "Tapping" "on"
    Option "TappingDrag" "on"
    Option "ClickMethod" "none"
EndSection
