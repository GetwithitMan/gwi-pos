# =============================================================================
# GWI POS — Ansible Configuration
# =============================================================================
# Local-only execution against localhost. JSON callback for machine-readable
# output. Retry files disabled for idempotent re-runs.
# =============================================================================

[defaults]
# Inventory
inventory = inventory/local.yml

# Output — deterministic JSON for machine parsing
stdout_callback = json
callback_whitelist = json

# Performance
forks = 1
gathering = smart
fact_caching = memory
fact_caching_timeout = 3600

# Disable retry files — idempotent roles don't need them
retry_files_enabled = False

# Disable cowsay — machine output only
nocows = True

# Roles path
roles_path = roles

# Logging
log_path = /opt/gwi-pos/state/ansible-run.log

# Increase task timeout for package installs
timeout = 120

# Reduce SSH noise (irrelevant for local but set for safety)
host_key_checking = False

# Prevent ansible-galaxy from prompting
force_valid_group_names = ignore

[privilege_escalation]
become = True
become_method = sudo
become_user = root
become_ask_pass = False

[connection]
# All execution is local — no SSH involved
pipelining = True
