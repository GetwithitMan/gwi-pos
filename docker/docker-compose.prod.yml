# GWI POS — NUC Production Docker Compose
# Used by docker-deploy.sh for production NUC deployments.
# Host networking for Socket.io + local PostgreSQL access.

services:
  gwi-pos:
    image: ${IMAGE_REF:-ghcr.io/getwithitman/gwi-pos:latest}
    container_name: gwi-pos
    restart: unless-stopped
    network_mode: host
    env_file: /opt/gwi-pos/shared/.env
    environment:
      - NODE_ENV=production
      - PORT=${PORT:-3005}
      - HOSTNAME=0.0.0.0
    volumes:
      - /opt/gwi-pos/shared:/opt/gwi-pos/shared
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${PORT:-3005}/api/health/ready"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

  gwi-agent:
    image: ${IMAGE_REF:-ghcr.io/getwithitman/gwi-pos:latest}
    container_name: gwi-agent
    restart: unless-stopped
    network_mode: host
    user: root
    command: ["node", "public/sync-agent.js"]
    env_file: /opt/gwi-pos/shared/.env
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /opt/gwi-pos/shared:/opt/gwi-pos/shared
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
